<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <title>Set New Password - InternTrack</title>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <!-- Logo -->
    <a href="index.html" style="position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: transform 0.3s ease;" onmouseover="this.style.transform='translateX(5px)'" onmouseout="this.style.transform='translateX(0)'">
        <div style="width: 45px; height: 45px; background: var(--accent-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--shadow);">
            <i class="fas fa-graduation-cap" style="font-size: 24px; color: white;"></i>
        </div>
        <span style="font-size: 20px; font-weight: 700; color: var(--text-primary);">InternTrack</span>
    </a>

    <div class="page-container">
        <div class="card">
            <div class="logo">
                <i class="fas fa-lock"></i>
                <h1>Set New Password</h1>
            </div>

            <p class="subtitle">Create a strong password for <strong id="userEmail" style="color: var(--accent-color);"></strong></p>

            <div id="message" class="message"></div>

            <form id="newPasswordForm">
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <div style="position: relative;">
                        <input type="password" id="newPassword" placeholder="Minimum 7 characters" required minlength="7" style="padding-right: 45px;">
                        <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)" style="position: absolute; right: 12px; top: 12px; background: none; border: none; cursor: pointer; color: var(--text-secondary);">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" placeholder="Re-enter password" required minlength="7" style="padding-right: 45px;">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 12px; top: 12px; background: none; border: none; cursor: pointer; color: var(--text-secondary);">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small style="display: block; margin-top: 5px; color: var(--text-secondary); font-size: 12px;">
                        <i class="fas fa-info-circle"></i> Password: 7+ chars, only @ and ! allowed
                    </small>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary">
                    <i class="fas fa-check"></i> Reset Password
                </button>
            </form>

            <div class="text-center" style="margin-top: 25px;">
                <a href="index.html" class="link">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="new-password.js"></script>
</body>

</html>
