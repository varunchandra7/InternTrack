<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <title>Verify Email - Create Account</title>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <!-- Logo -->
    <a href="index.html" style="position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: transform 0.3s ease;" onmouseover="this.style.transform='translateX(5px)'" onmouseout="this.style.transform='translateX(0)'">
        <div style="width: 45px; height: 45px; background: var(--accent-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--shadow);">
            <i class="fas fa-graduation-cap" style="font-size: 24px; color: white;"></i>
        </div>
        <span style="font-size: 20px; font-weight: 700; color: var(--text-primary);">InternTrack</span>
    </a>

    <div class="page-container">
        <div class="card">
            <div class="logo">
                <i class="fas fa-envelope-open-text"></i>
                <h1>Verify Your Email</h1>
            </div>

            <p class="subtitle">We've sent a 6-digit OTP to<br><strong id="userEmail" style="color: var(--accent-color);">your-email@gmail.com</strong></p>
            
            <div id="message" class="message"></div>
            
            <form id="otpForm">
                <div class="otp-container">
                    <input type="text" maxlength="1" class="otp-input" data-index="0" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" data-index="1" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" data-index="2" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" data-index="3" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" data-index="4" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" data-index="5" autocomplete="off">
                </div>
                
                <button type="submit" class="btn btn-primary" id="verifyBtn">
                    <i class="fas fa-check-circle"></i> Verify Email
                </button>
            </form>

            <div class="text-center" style="margin-top: 20px;">
                <p style="margin-bottom: 10px; color: var(--text-secondary);">OTP expires in: <strong id="timer" style="color: var(--accent-color);">10:00</strong></p>
            </div>

            <div class="text-center">
                <p style="margin-bottom: 10px;">Didn't receive the code?</p>
                <button class="btn btn-secondary" id="resendBtn">
                    <i class="fas fa-redo"></i> Resend OTP
                </button>
            </div>

            <div class="text-center" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <p style="color: var(--text-secondary); font-size: 14px;">
                    Changed your mind? <a href="index.html" style="color: var(--accent-color); text-decoration: none; font-weight: 500;">Back to login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="theme.js"></script>
    <script src="signup-otp.js"></script>
</body>

</html>
