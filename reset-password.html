<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <title>Reset Password - InternTrack</title>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <!-- Logo -->
    <a href="index.html" style="position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: transform 0.3s ease;" onmouseover="this.style.transform='translateX(5px)'" onmouseout="this.style.transform='translateX(0)'">
        <div style="width: 45px; height: 45px; background: var(--accent-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--shadow);">
            <i class="fas fa-graduation-cap" style="font-size: 24px; color: white;"></i>
        </div>
        <span style="font-size: 20px; font-weight: 700; color: var(--text-primary);">InternTrack</span>
    </a>

    <div class="page-container">
        <div class="card">
            <div class="logo">
                <i class="fas fa-key"></i>
                <h1>Reset Password</h1>
            </div>

            <p class="subtitle">Enter the OTP sent to <strong id="userEmail" style="color: var(--accent-color);"></strong></p>

            <div id="message" class="message"></div>

            <form id="otpVerifyForm">
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                </div>

                <button type="submit" id="verifyOtpBtn" class="btn btn-primary">
                    <i class="fas fa-check-circle"></i> Verify OTP
                </button>
            </form>

            <div class="text-center" style="margin-top: 20px;">
                <p style="margin-bottom: 10px;">Didn't receive OTP?</p>
                <button id="resendBtn" class="btn btn-secondary" onclick="resendOTP()">
                    <i class="fas fa-redo"></i> Resend OTP
                </button>
            </div>

            <div class="text-center" style="margin-top: 25px;">
                <a href="index.html" class="link">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="theme.js"></script>
    <script src="reset-password.js"></script>
</body>

</html>
