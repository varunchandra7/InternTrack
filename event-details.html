<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - InternTrack</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            margin: 0;
            padding: 2rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        .back-button:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: translateX(-4px);
        }

        .event-details-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .event-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .event-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .event-company {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .badges {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge-internship {
            background: rgba(99, 102, 241, 0.1);
            color: #6366f1;
        }

        .badge-hackathon {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }

        .badge-workshop {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .event-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 8px;
        }

        .info-item i {
            font-size: 1.25rem;
            color: var(--accent-color);
            margin-top: 0.25rem;
        }

        .info-content h4 {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-content p {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: var(--accent-color);
        }

        .description {
            line-height: 1.8;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .skills-list, .rounds-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .skill-tag, .round-item {
            padding: 0.5rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-primary);
        }

        .round-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .round-item i {
            color: var(--accent-color);
            font-size: 0.75rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-color);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .loading i {
            font-size: 3rem;
            color: var(--accent-color);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 3rem;
        }

        .error i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .error h2 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .error p {
            color: var(--text-secondary);
        }

        /* Preparation Guide Styles */
        .preparation-guide {
            background: var(--bg-primary);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .preparation-guide .section-title {
            color: var(--accent-color);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .guide-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .guide-section {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .guide-section h4 {
            font-size: 1.15rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .guide-section h4 i {
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .guide-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .guide-section li {
            padding: 0.75rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
            line-height: 1.7;
            border-bottom: 1px solid var(--border-color);
        }

        .guide-section li:last-child {
            border-bottom: none;
        }

        .guide-section li::before {
            content: "▸";
            color: var(--accent-color);
            font-weight: bold;
            position: absolute;
            left: 0;
            top: 0.75rem;
        }

        .guide-section li strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Enhanced Description Styles */
        .enhanced-description {
            line-height: 1.8;
        }

        .enhanced-description .main-description {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            font-weight: 500;
        }

        .description-section {
            margin: 1.5rem 0;
            padding: 1.25rem;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .description-section h4 {
            font-size: 1.15rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .description-section h4 i {
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .description-section p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 0.75rem;
        }

        .description-section p strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .benefits-list {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
        }

        .benefits-list li {
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: var(--bg-secondary);
            border-radius: 6px;
            border-left: 3px solid var(--accent-color);
            color: var(--text-secondary);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }

        .benefits-list li:hover {
            transform: translateX(5px);
            border-left-color: var(--accent-hover);
        }

        .benefits-list li i {
            color: var(--accent-color);
            font-size: 1rem;
            margin-top: 0.15rem;
            min-width: 20px;
        }

        .benefits-list li strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .container {
                padding: 1.5rem;
            }

            .event-details-card {
                padding: 2rem;
            }

            .event-title {
                font-size: 1.75rem;
            }

            .event-info-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .btn {
                padding: 0.9rem 1.5rem;
                min-width: 150px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
                max-width: 100%;
            }

            .back-button {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
                margin-bottom: 1.5rem;
            }

            .event-details-card {
                padding: 1.5rem;
                border-radius: 12px;
            }

            .event-title {
                font-size: 1.5rem;
                margin-bottom: 0.3rem;
            }

            .event-company {
                font-size: 1rem;
                margin-bottom: 0.75rem;
            }

            .event-info-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .info-item {
                padding: 0.75rem;
                gap: 0.75rem;
            }

            .info-item i {
                font-size: 1.1rem;
            }

            .info-content h4 {
                font-size: 0.75rem;
            }

            .info-content p {
                font-size: 0.9rem;
            }

            .section {
                margin-bottom: 1.5rem;
            }

            .section-title {
                font-size: 1.1rem;
                margin-bottom: 0.75rem;
            }

            .action-buttons {
                gap: 0.75rem;
            }

            .btn {
                min-width: 100%;
                padding: 0.8rem 1.2rem;
                font-size: 0.9rem;
                flex: 1;
            }

            .preparation-guide {
                padding: 1.5rem;
                margin-top: 1.5rem;
                border-radius: 10px;
            }

            .preparation-guide .section-title {
                font-size: 1.25rem;
                margin-bottom: 1rem;
            }

            .guide-section {
                padding: 1rem;
                margin-bottom: 1rem;
            }

            .guide-section h4 {
                font-size: 1rem;
                margin-bottom: 0.75rem;
            }

            .guide-section li {
                padding: 0.6rem 0;
                padding-left: 1.25rem;
                font-size: 0.9rem;
            }

            .enhanced-description .main-description {
                font-size: 1rem;
                padding: 0.75rem;
                margin-bottom: 1.5rem;
            }

            .description-section {
                margin: 1rem 0;
                padding: 1rem;
            }

            .description-section h4 {
                font-size: 1rem;
                margin-bottom: 0.75rem;
            }

            .description-section p {
                font-size: 0.9rem;
            }

            .benefits-list li {
                padding: 0.6rem;
                gap: 0.6rem;
                margin: 0.4rem 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0.75rem;
            }

            .back-button {
                padding: 0.6rem 0.8rem;
                font-size: 0.85rem;
                margin-bottom: 1rem;
                gap: 0.4rem;
            }

            .event-details-card {
                padding: 1.25rem;
                border-radius: 10px;
            }

            .event-header {
                padding-bottom: 1rem;
                margin-bottom: 1.5rem;
            }

            .event-title {
                font-size: 1.25rem;
                margin-bottom: 0.25rem;
            }

            .event-company {
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
            }

            .badges {
                gap: 0.5rem;
                margin-top: 0.75rem;
            }

            .badge {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }

            .event-info-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .info-item {
                padding: 0.6rem;
                gap: 0.5rem;
            }

            .info-item i {
                font-size: 1rem;
            }

            .info-content h4 {
                font-size: 0.7rem;
                margin-bottom: 0.2rem;
            }

            .info-content p {
                font-size: 0.85rem;
            }

            .section {
                margin-bottom: 1.25rem;
            }

            .section-title {
                font-size: 1rem;
                margin-bottom: 0.65rem;
            }

            .description {
                padding: 1rem;
                font-size: 0.9rem;
                line-height: 1.6;
            }

            .skills-list, .rounds-list {
                gap: 0.5rem;
            }

            .skill-tag, .round-item {
                padding: 0.4rem 0.7rem;
                font-size: 0.8rem;
            }

            .action-buttons {
                flex-direction: column;
                gap: 0.6rem;
                margin-top: 1.5rem;
            }

            .btn {
                min-width: 100%;
                padding: 0.7rem 1rem;
                font-size: 0.85rem;
                border-radius: 7px;
                height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .preparation-guide {
                padding: 1.25rem;
                margin-top: 1.25rem;
                border-radius: 8px;
            }

            .preparation-guide .section-title {
                font-size: 1.1rem;
                margin-bottom: 0.85rem;
            }

            .guide-section {
                padding: 0.85rem;
                margin-bottom: 0.85rem;
            }

            .guide-section h4 {
                font-size: 0.95rem;
                margin-bottom: 0.65rem;
            }

            .guide-section li {
                padding: 0.5rem 0;
                padding-left: 1.1rem;
                font-size: 0.85rem;
            }

            .enhanced-description .main-description {
                font-size: 0.9rem;
                padding: 0.6rem;
                margin-bottom: 1.25rem;
            }

            .description-section {
                margin: 0.85rem 0;
                padding: 0.85rem;
                border-radius: 6px;
            }

            .description-section h4 {
                font-size: 0.95rem;
                margin-bottom: 0.65rem;
            }

            .description-section p {
                font-size: 0.85rem;
                margin-bottom: 0.5rem;
            }

            .benefits-list {
                margin: 0.75rem 0;
            }

            .benefits-list li {
                padding: 0.5rem;
                gap: 0.5rem;
                margin: 0.3rem 0;
                font-size: 0.85rem;
            }

            .benefits-list li i {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 0.5rem;
            }

            .back-button {
                padding: 0.5rem 0.7rem;
                font-size: 0.8rem;
                margin-bottom: 0.75rem;
            }

            .event-details-card {
                padding: 1rem;
            }

            .event-title {
                font-size: 1.1rem;
            }

            .event-company {
                font-size: 0.85rem;
            }

            .badge {
                padding: 0.3rem 0.6rem;
                font-size: 0.7rem;
            }

            .info-item {
                padding: 0.5rem;
            }

            .info-content h4 {
                font-size: 0.65rem;
            }

            .info-content p {
                font-size: 0.75rem;
            }

            .section-title {
                font-size: 0.95rem;
            }

            .btn {
                padding: 0.6rem 0.8rem;
                font-size: 0.8rem;
            }

            .preparation-guide {
                padding: 1rem;
            }

            .guide-section {
                padding: 0.75rem;
            }

            .guide-section h4 {
                font-size: 0.9rem;
            }

            .guide-section li {
                padding: 0.4rem 0;
                font-size: 0.8rem;
            }
        }
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" class="back-button">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>

        <div id="eventDetailsContainer">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>Loading event details...</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="theme.js"></script>
    <script src="event-details.js"></script>
</body>
</html>
